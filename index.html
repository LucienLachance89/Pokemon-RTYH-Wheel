<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Animated Wheel</title>
    <style>
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            background: #1a1a1a; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; 
            color: white;
        }
        
        .wheel-outer { 
            position: relative; 
            width: 450px; 
            height: 450px; 
        }
        
        .pointer { 
            width: 0; 
            height: 0; 
            border-left: 20px solid transparent; 
            border-right: 20px solid transparent; 
            border-top: 40px solid #ff4757; 
            position: absolute; 
            top: -15px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 100; 
            filter: drop-shadow(0 0 10px #ff4757); 
        }

        #wheel { 
            width: 100%; 
            height: 100%; 
            border-radius: 50%; 
            position: relative; 
            overflow: hidden; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); 
            border: 10px solid #444; 
            box-shadow: 0 0 50px rgba(0,255,255,0.2); 
            background: #333; 
        }

        .segment { 
            position: absolute; 
            width: 50%; 
            height: 50%; 
            top: 0; 
            left: 50%; 
            transform-origin: 0% 100%; 
            background-size: cover; 
            background-position: center; 
            border: 1px solid rgba(255,255,255,0.2); 
        }

        #seg1 { transform: rotate(0deg);   background-image: url('Mega-Dream-ex-Box.webp'); }
        #seg2 { transform: rotate(90deg);  background-image: url('megaevolutionbuildbattle.webp'); }
        #seg3 { transform: rotate(180deg); background-image: url('Ninja Spinner.jpg'); }
        #seg4 { transform: rotate(270deg); background-image: url('destined-rivals-best-chase-cards-most-vauable-set-guide-header.jpg'); }

        button { 
            margin-top: 30px; 
            padding: 15px 50px; 
            font-size: 22px; 
            cursor: pointer; 
            background: linear-gradient(135deg, #2ed573, #7bed9f); 
            border: none; 
            border-radius: 50px; 
            color: white; 
            font-weight: bold; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); 
            transition: 0.2s; 
            z-index: 100;
        }
        
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="wheel-outer">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="segment" id="seg1"></div>
            <div class="segment" id="seg2"></div>
            <div class="segment" id="seg3"></div>
            <div class="segment" id="seg4"></div>
        </div>
    </div>

    <button id="spinBtn" onclick="spin()">SPIN THE WHEEL</button>

    <script>
        const wheel = document.getElementById('wheel');
        const btn = document.getElementById('spinBtn');
        const options = ["Mega Dream", "Mega Evolution", "Ninja Spinner", "Destin Rivals"];
        let currentRotation = 0;

        function spin() {
            btn.disabled = true;
            const extraSpins = (Math.floor(Math.random() * 5) + 5) * 360; 
            const randomStop = Math.floor(Math.random() * 360);
            currentRotation += extraSpins + randomStop;
            
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                btn.disabled = false;
                const landingDeg = (360 - (currentRotation % 360)) % 360; 
                const winnerIndex = Math.floor(landingDeg / 90);
                alert("🎉 Result: " + options[winnerIndex]);
            }, 4100);
        }
    </script>
</body>
</html>
